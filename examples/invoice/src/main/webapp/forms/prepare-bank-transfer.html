<form class="form-horizontal">

  <p>Please prepare the bank transfer for the following invoice</p>

  <div class="form-group mb-3">
    <label class="form-label col-md-2">Invoice Document</label>
    <div class="form-control-static col-md-10">
      <a cam-file-download="invoiceDocument"></a>
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label col-md-2" for="creditor">Creditor</label>
    <div class="col-md-10">
      <input cam-variable-name="creditor"
             type="text"
             id="creditor"
             name="creditor"
             readonly="true"
             class="form-control" />
    </div>
  </div>
  <div class="form-group mb-3">
    <label class="form-label col-md-2" for="amount">Amount</label>
    <div class="col-md-10">
      <input cam-variable-name="amount"
             type="text"
             id="amount"
             name="amount"
             readonly="true"
             class="form-control" />
    </div>
  </div>
  <div class="form-group mb-3">
    <label class="form-label col-md-2" for="invoiceNumber">Invoice Number</label>
    <div class="col-md-10">
      <input cam-variable-name="invoiceNumber"
             type="text"
             id="invoiceNumber"
             name="invoiceNumber"
             readonly="true"
             class="form-control" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label col-md-2" for="approver">Approved by </label>
    <div class="col-md-10">
      <input cam-variable-name="approver"
             type="text"
             id="approver"
             name="approver"
             readonly="true"
             class="form-control" />
    </div>
  </div>
</form>
