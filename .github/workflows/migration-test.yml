name: Database Migration Test

on:
  pull_request:
    branches:
      - main
      - release/**
    paths:
      - '**/*.sql'
      - 'qa/test-db-rolling-update/**'
  schedule:
    - cron: "15 1 * * 5"     # Runs at 1:15 AM UTC Friday
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db: [mysql, mariadb, postgres, oracle, sqlserver]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0.11.4.2.0

      - name: Run QA script
        run: |
          ./mvnw clean install -DskipTests -PskipFrontendBuild
          cd qa/test-database-container
          ./test.sh ${{ matrix.db }}
