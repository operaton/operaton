services:
  operaton:
    image: operaton/operaton:latest
    environment:
      - OPERATON_BPM_RUN_CORS_ENABLED=true
      - OPERATON_BPM_RUN_AUTH_ENABLED=false
      - OPERATON_BPM_RUN_CORS_ALLOW_CREDENTIALS=true
      - OPERATON_BPM_RUN_CORS_ALLOWED_ORIGINS=http://127.0.0.1:5173
      - OPERATON_BPM_RUN_CORS_ALLOWED_HEADERS=Origin,X-Requested-With,Content-Type,Accept,Authorization
      - LOGGING_LEVEL_ROOT=DEBUG
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=operaton
      - KEYCLOAK_CLIENT_ID=operaton-identity-service
      - KEYCLOAK_CLIENT_SECRET=operaton-identity-secret
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:5173
      - REST_AUTH_ENABLED=false
    ports:
      - "8084:8080"
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    command: start-dev --import-realm
    volumes:
      - ./keycloak/operaton-realm.json:/opt/keycloak/data/import/operaton-realm.json:z
    ports:
      - "8888:8080"
