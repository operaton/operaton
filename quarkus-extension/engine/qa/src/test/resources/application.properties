# cDI: Investigate the default configuration of auto-inject-fields
quarkus.arc.auto-inject-fields=false
quarkus.arc.remove-unused-beans=false

quarkus.log.level=INFO
quarkus.log.category."org.operaton".level=INFO

quarkus.datasource.jdbc.url=jdbc:h2:mem:operaton;TRACE_LEVEL_FILE=0;DB_CLOSE_ON_EXIT=FALSE

quarkus.operaton.generic-config.enforce-history-time-to-live=false