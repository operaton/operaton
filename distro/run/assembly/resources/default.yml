# Find more available configuration properties on the following pages of the documentation.
# https://docs.operaton.org/manual/latest/user-guide/operaton-bpm-run/#configure-operaton-bpm-run
# https://docs.operaton.org/manual/latest/user-guide/spring-boot-integration/configuration/#operaton-engine-properties

operaton.bpm:
  admin-user:
    id: demo
    password: demo
  filter:
    create: All tasks
  webapp:
    # The new web apps (webapps-neo) are served at the application root (/).
    # They are DISABLED by default. Enable them by setting the
    # OPERATON_BPM_RUN_ENABLE_NEW_WEB_APPS environment variable to "true"
    # (or start run.sh / run.bat with the --webapps-neo flag).
    neo:
      enabled: ${OPERATON_BPM_RUN_ENABLE_NEW_WEB_APPS:false}
    # The legacy web apps are served at /operaton/app and are enabled by default.
    # Disable them via the OPERATON_BPM_WEBAPP_ENABLED environment variable or by
    # setting operaton.bpm.webapp.enabled: false here.
    # enabled: false
  run:
# https://docs.operaton.org/manual/latest/user-guide/operaton-bpm-run/#cross-origin-resource-sharing
    cors:
      enabled: true
      allowed-origins: "*"
    rest:
      disable-wadl: false
    deployment:
      deploy-changed-only: true
# https://docs.operaton.org/manual/latest/user-guide/operaton-bpm-run/#example-application
    example:
      enabled: true

# datasource configuration is required
spring.datasource:
  url: jdbc:h2:./operaton-h2-default/process-engine;TRACE_LEVEL_FILE=0;DB_CLOSE_ON_EXIT=FALSE
  driver-class-name: org.h2.Driver
  username: sa
  password: sa

# By default, Spring Boot serves static content from any directories called /static or /public or /resources or
# /META-INF/resources in the classpath. To prevent users from accidentally sharing files, this is disabled here by setting static locations to NULL.
# https://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#boot-features-spring-mvc-static-content
spring.web.resources:
  static-locations: NULL

# ---------------------------------------------------------------------------
# OAuth2 for the new web apps (webapps-neo)
# ---------------------------------------------------------------------------
# Start Operaton with the --oauth2 flag and uncomment the blocks below to let
# webapps-neo authenticate against the backend through the Spring OAuth2 module
# (server-side session) instead of HTTP Basic auth. Replace the sample values
# with your identity provider's settings. With same-origin embedded webapps you
# typically also want to disable the wildcard CORS above
# (operaton.bpm.run.cors.enabled: false).
#
# operaton.bpm.run.auth:
#   enabled: true
#   authentication: oauth2
#
# operaton.bpm.oauth2:
#   identity-provider:
#     group-name-attribute: groups
#
# spring.security.oauth2.client:
#   registration:
#     operaton:
#       client-id: operaton
#       client-secret: "********"
#       authorization-grant-type: authorization_code
#       scope: openid,profile,email
#       redirect-uri: "{baseUrl}/login/oauth2/code/operaton"
#   provider:
#     operaton:
#       issuer-uri: https://your-idp.example.com/realms/operaton