name: Prepare Build
description: Analyzes PR context and emits build optimization outputs (skip_tests, skip_engine_tests, changed_modules)

inputs:
  github-token:
    description: GitHub token for REST API access to changed files
    required: true

outputs:
  skip_tests:
    description: '"true" if all tests should be skipped'
    value: ${{ steps.prepare.outputs.skip_tests }}
  skip_engine_tests:
    description: '"true" if the engine test suite should be excluded from a full build'
    value: ${{ steps.prepare.outputs.skip_engine_tests }}
  changed_modules:
    description: 'Comma-separated module dirs for a narrowed -pl build; empty = full build'
    value: ${{ steps.prepare.outputs.changed_modules }}

runs:
  using: composite
  steps:
    - name: Run prepare script
      id: prepare
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        # Default GitHub Actions env vars consumed by the script, listed for self-documentation.
        # These are also injected automatically by the runner, so the values below are redundant
        # but make the script's dependencies explicit.
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        # GITHUB_OUTPUT is managed by the runner per-step and is not re-declared here.
      run: python3 ${{ github.action_path }}/prepare_build.py
